<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#a)"/>
  <!-- Subtle inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <!-- Controller body -->
  <rect x="7" y="20" width="50" height="26" rx="13" fill="url(#b)"/>
  <!-- Left grip -->
  <ellipse cx="14" cy="47" rx="7" ry="9" fill="url(#b)"/>
  <!-- Right grip -->
  <ellipse cx="50" cy="47" rx="7" ry="9" fill="url(#b)"/>
  <!-- D-pad horizontal -->
  <rect x="11" y="31.5" width="14" height="5" rx="2.5" fill="#6366f1"/>
  <!-- D-pad vertical -->
  <rect x="15.5" y="27" width="5" height="13" rx="2.5" fill="#6366f1"/>
  <!-- Face buttons -->
  <circle cx="47" cy="29" r="4" fill="#ef4444"/>
  <circle cx="41" cy="34" r="4" fill="#22c55e"/>
  <circle cx="47" cy="39" r="4" fill="#3b82f6"/>
  <circle cx="53" cy="34" r="4" fill="#fbbf24"/>
  <!-- Center buttons (Select / Start) -->
  <rect x="26" y="33" width="5" height="2.5" rx="1.25" fill="#818cf8" opacity="0.8"/>
  <rect x="33" y="33" width="5" height="2.5" rx="1.25" fill="#818cf8" opacity="0.8"/>
  <!-- Shine on top -->
  <ellipse cx="32" cy="24" rx="18" ry="5" fill="white" opacity="0.08"/>
</svg>
